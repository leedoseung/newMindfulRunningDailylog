<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,700;0,800;1,300;1,400;1,700&family=Roboto:wght@300;400;500&display=swap');
  body {
    background: #111827;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Roboto', sans-serif;
    padding: 20px;
    gap: 16px;
  }
  .label { color: rgba(255,255,255,0.5); font-size: 0.78rem; font-family: sans-serif; text-align: center; }
  .phone-frame {
    width: 375px;
    height: 812px;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.08);
  }
  .gradient-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(-45deg, #0f1923, #1e3a5f, #2E91FC, #162d4a, #0f1923);
    background-size: 400% 400%;
    animation: gradientShift 8s ease infinite;
  }
  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .gradient-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 25% 20%, rgba(46,145,252,0.3) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 65%, rgba(46,145,252,0.18) 0%, transparent 45%);
  }
  .top-section {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 90px 32px 36px;
    height: 58%;
  }
  .brand {
    font-family: 'Raleway', sans-serif;
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 24px;
  }
  .logo-wrap {
    margin-bottom: 28px;
    animation: floatLogo 4s ease-in-out infinite;
  }
  @keyframes floatLogo {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-7px); }
  }
  .logo-wrap img {
    width: 76px;
    height: 76px;
    object-fit: contain;
    filter: brightness(0) invert(1);
    opacity: 0.9;
  }
  .quote {
    font-family: 'Raleway', sans-serif;
    font-size: 0.95rem;
    font-weight: 300;
    font-style: italic;
    color: rgba(255,255,255,0.82);
    text-align: center;
    line-height: 1.75;
    letter-spacing: 0.1px;
    max-width: 255px;
  }
  .quote em {
    font-style: normal;
    font-weight: 700;
    color: #ffffff;
  }
  .login-card {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 46%;
    background: #ffffff;
    border-radius: 28px 28px 0 0;
    padding: 20px 24px 44px;
    z-index: 2;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.35);
  }
  .handle {
    width: 36px;
    height: 4px;
    background: #e0e0e0;
    border-radius: 2px;
    margin: 0 auto 22px;
  }
  .kakao-btn {
    width: 100%;
    padding: 15px;
    background: #FEE500;
    border: none;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-family: 'Raleway', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    color: #191919;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(254,229,0,0.45);
    margin-bottom: 16px;
  }
  .kakao-icon {
    width: 22px; height: 22px;
    background: #191919;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 900; color: #FEE500;
    font-family: serif;
  }
  .divider {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .div-line { flex: 1; height: 1px; background: #EBEBEB; }
  .div-text { font-size: 0.65rem; color: #bbb; font-weight: 500; }
  .email-wrap {
    background: #F4F5F6;
    border-radius: 14px;
    padding: 13px 14px;
    display: flex; gap: 10px; align-items: center;
    margin-bottom: 12px;
  }
  .email-input {
    flex: 1; background: none; border: none; outline: none;
    font-family: 'Roboto', sans-serif; font-size: 0.83rem; color: #2d3031;
  }
  .email-input::placeholder { color: #c0c0c0; }
  .magic-btn {
    background: #2d3031; color: #fff; border: none;
    border-radius: 10px; padding: 9px 13px;
    font-family: 'Raleway', sans-serif; font-size: 0.68rem; font-weight: 700;
    cursor: pointer; white-space: nowrap;
  }
  .caption {
    text-align: center; font-size: 0.58rem; color: #c0c0c0;
    line-height: 1.6;
  }
</style>
</head>
